services:
  - type: web
    name: aqi-monitoring-api
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: FullStackBackend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: aqi-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: aqi-postgres
    databaseName: aqi_db
    user: postgres
    plan: free
